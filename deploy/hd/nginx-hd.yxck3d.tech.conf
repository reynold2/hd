server {
    listen 80;
    listen [::]:80;
    server_name hd.yxck3d.tech;

    root /www/dk_project/wwwroot/hd/merchant-admin/dist;
    index index.html;
    client_max_body_size 50m;

    location ^~ /.well-known/acme-challenge/ {
        root /www/dk_project/wwwroot/hd/merchant-admin/dist;
        default_type text/plain;
        try_files $uri =404;
    }

    location /health {
        proxy_pass http://127.0.0.1:8020/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8020/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        alias /www/dk_project/wwwroot/hd/merchant-admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    location = /customer {
        return 301 /customer/;
    }

    location /customer/ {
        alias /www/dk_project/wwwroot/hd/customer-miniapp/dist/build/h5/;
        try_files $uri $uri/ /customer/index.html;
    }

    location / {
        return 302 /admin/;
    }

    access_log /www/wwwlogs/hd.yxck3d.tech.log;
    error_log /www/wwwlogs/hd.yxck3d.tech.error.log;
}

server {
    listen 443 ssl;
    http2 on;
    server_name hd.yxck3d.tech;

    ssl_certificate /www/server/panel/vhost/letsencrypt/hd.yxck3d.tech/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/letsencrypt/hd.yxck3d.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:EECDH+AES256:!MD5;
    ssl_prefer_server_ciphers on;

    root /www/dk_project/wwwroot/hd/merchant-admin/dist;
    index index.html;
    client_max_body_size 50m;

    location ^~ /.well-known/acme-challenge/ {
        root /www/dk_project/wwwroot/hd/merchant-admin/dist;
        default_type text/plain;
        try_files $uri =404;
    }

    location /health {
        proxy_pass http://127.0.0.1:8020/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8020/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        alias /www/dk_project/wwwroot/hd/merchant-admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    location = /customer {
        return 301 /customer/;
    }

    location /customer/ {
        alias /www/dk_project/wwwroot/hd/customer-miniapp/dist/build/h5/;
        try_files $uri $uri/ /customer/index.html;
    }

    location / {
        return 302 /admin/;
    }

    access_log /www/wwwlogs/hd.yxck3d.tech.ssl.log;
    error_log /www/wwwlogs/hd.yxck3d.tech.ssl.error.log;
}
